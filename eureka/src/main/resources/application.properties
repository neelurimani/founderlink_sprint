spring.application.name=eureka
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Avoid Spring Boot web default 8080 (same as api-gateway) if remote eureka.yml is missing.
server.port=${EUREKA_SERVER_PORT:${DISCOVERY_SERVER_PORT:8761}}

# Only bootstrap: all runtime config must come from Config Server.
spring.config.import=configserver:${CONFIG_SERVER_URL:http://localhost:8888}
spring.cloud.config.fail-fast=true
