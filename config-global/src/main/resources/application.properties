spring.application.name=config-global
server.port=8888

# Remote Git-backed config (no local config dependency).
# Private GitHub repos: JGit only gets a CredentialsProvider if BOTH username and password are non-empty.
# PAT alone in GIT_PASSWORD is ignored unless GIT_USERNAME is set. GitHub HTTPS + PAT: username can be
# your GitHub login or the literal "x-access-token"; password = PAT. We default username so PAT-only env works.
spring.profiles.active=git
spring.cloud.config.server.git.uri=https://github.com/neelurimani/FounderLinkGlobal
spring.cloud.config.server.git.default-label=${CONFIG_GIT_BRANCH:main}
spring.cloud.config.server.git.clone-on-start=true
spring.cloud.config.server.git.search-paths=${CONFIG_GIT_SEARCH_PATHS:global-config,.}


eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info
