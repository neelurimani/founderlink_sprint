server:
  port: ${STARTUP_SERVICE_PORT:8082}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/startup_service?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:${MYSQL_USERNAME:root}}
    password: ${DB_PASSWORD:${MYSQL_PASSWORD:12345678}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      continue-on-error: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Prefer localhost for single-machine dev so investment-service (Feign) always reaches this instance.
# For multi-host / Docker stacks set EUREKA_INSTANCE_HOSTNAME to a routable hostname or service name.
eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:false}
