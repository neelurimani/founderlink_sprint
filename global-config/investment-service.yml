server:
  port: ${INVESTMENT_SERVICE_PORT:8084}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/investment_service?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:${MYSQL_USERNAME:root}}
    password: ${DB_PASSWORD:${MYSQL_PASSWORD:12345678}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      continue-on-error: true
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 15000
            loggerLevel: full
          startup-service:
            url: ${founderlink.startup-service-url:${STARTUP_SERVICE_URL:}}
          user-service:
            url: ${founderlink.user-service-url:${USER_SERVICE_URL:}}

logging:
  level:
    com.founderlink.investmentservice.client: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info
