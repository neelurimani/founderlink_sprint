server:
  port: ${TEAM_SERVICE_PORT:8088}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/team_service?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:${MYSQL_USERNAME:root}}
    password: ${DB_PASSWORD:${MYSQL_PASSWORD:12345678}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
