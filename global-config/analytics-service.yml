server:
  port: ${ANALYTICS_SERVICE_PORT:8087}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/analytics_service?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:${MYSQL_USERNAME:root}}
    password: ${DB_PASSWORD:${MYSQL_PASSWORD:12345678}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      continue-on-error: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info
