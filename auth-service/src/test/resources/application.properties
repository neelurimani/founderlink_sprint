# Overrides main bootstrap for @SpringBootTest — no Config Server.
spring.application.name=auth-service
spring.cloud.config.enabled=false
spring.cloud.discovery.enabled=false
eureka.client.enabled=false
spring.config.import=

spring.datasource.url=jdbc:h2:mem:auth_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

security.jwt.secret=test-secret-key-at-least-32-characters-long!!
founderlink.jwt.access-token-expiry-minutes=60
founderlink.jwt.refresh-token-expiry-days=7
founderlink.admin-registration.enabled=true
founderlink.admin-registration.code=founderlink-admin-2026

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
